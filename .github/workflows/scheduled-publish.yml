name: Scheduled publish

# Publishes future-dated blog posts on their pubDate with no manual step and no
# secrets. Cloudflare Pages rebuilds on every push to `main` (git integration),
# and the production build hides posts whose pubDate is still in the future
# (see src/utils/posts.ts). This job runs daily and, only on a day when a
# non-draft post is due, pushes a tiny commit to `main` to trigger that rebuild.
#
# You can also run it on demand from the Actions tab (Run workflow) to force a
# rebuild at any time.

on:
  schedule:
    - cron: '15 0 * * *' # daily at 00:15 UTC (~03:15 in Bodrum)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-due-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild production if a post is due
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          yesterday=$(date -u -d 'yesterday' +%Y-%m-%d)
          force="${{ github.event_name == 'workflow_dispatch' }}"

          due=""
          shopt -s nullglob
          for f in src/content/blog/*.md src/content/blog/*.mdx; do
            draft=$(grep -m1 -E '^draft:' "$f" | tr -d ' \r' | cut -d: -f2 || true)
            pub=$(grep -m1 -E '^pubDate:' "$f" | sed -E 's/^pubDate:[[:space:]]*//' | tr -d "\"' \r" | cut -c1-10 || true)
            if [ "$draft" != "true" ] && { [ "$pub" = "$today" ] || [ "$pub" = "$yesterday" ]; }; then
              due="$f"
              echo "Due post: $f (pubDate $pub)"
            fi
          done

          if [ "$force" != "true" ] && [ -z "$due" ]; then
            echo "No posts due today ($today). Nothing to rebuild."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-scheduled-rebuild.txt
          git add .github/last-scheduled-rebuild.txt
          git commit -m "chore: scheduled publish rebuild ($today)"
          git push origin main
          echo "Pushed rebuild commit. Cloudflare Pages will redeploy main."
