<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCFCFD"/>
      <stop offset="100%" stop-color="#F2F3F5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left side: the scattered calls and interactions -->
  <g fill="#82868C" fill-opacity="0.20">
    <rect x="120" y="110" width="64" height="64" rx="10"/>
    <rect x="230" y="180" width="64" height="64" rx="10"/>
    <rect x="120" y="260" width="64" height="64" rx="10"/>
    <rect x="230" y="330" width="64" height="64" rx="10"/>
    <rect x="120" y="410" width="64" height="64" rx="10"/>
  </g>

  <!-- lines: every interaction flows into the memory -->
  <g stroke="#82868C" stroke-opacity="0.28" stroke-width="2">
    <path d="M184,142 L470,290"/>
    <path d="M294,212 L470,300"/>
    <path d="M184,292 L470,310"/>
    <path d="M294,362 L470,320"/>
    <path d="M184,442 L470,330"/>
  </g>

  <!-- center: the memory that knows you -->
  <rect x="470" y="220" width="180" height="180" rx="14" fill="#2563EB" fill-opacity="0.30"/>
  <rect x="470" y="220" width="180" height="180" rx="14" stroke="#2563EB" stroke-opacity="0.45" stroke-width="2"/>

  <!-- the mirror: memory reflects a pattern back -->
  <g stroke="#2563EB" stroke-opacity="0.45" stroke-width="2">
    <path d="M650,310 L860,310"/>
  </g>
  <circle cx="920" cy="310" r="96" fill="none" stroke="#2563EB" stroke-opacity="0.45" stroke-width="2"/>
  <circle cx="920" cy="310" r="96" fill="#2563EB" fill-opacity="0.08"/>

  <!-- the pattern seen in the mirror -->
  <g stroke="#2563EB" stroke-opacity="0.55" stroke-width="2" fill="none">
    <path d="M872,340 C888,300 904,348 920,308 C936,268 952,332 968,292"/>
  </g>
  <g fill="#2563EB" fill-opacity="0.45">
    <circle cx="872" cy="340" r="5"/>
    <circle cx="920" cy="308" r="5"/>
    <circle cx="968" cy="292" r="5"/>
  </g>
</svg>
