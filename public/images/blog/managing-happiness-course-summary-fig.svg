<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="Stacked numbered list of the Managing Happiness course parts: managing yourself, defining your foundation, roles and responsibilities, planning and goal setting, and problem-solving plus finance.">
  <style>
    .num { font: 600 13px Helvetica, Arial, sans-serif; fill: #2563EB; letter-spacing: .08em; }
    .title { font: 700 21px Georgia, 'Times New Roman', serif; fill: #17181A; }
    .desc { font: 400 15px Helvetica, Arial, sans-serif; fill: #82868C; }
    .accent { fill: #2563EB; }
    .label { font: 600 12px Helvetica, Arial, sans-serif; letter-spacing: .12em; }
    .h { font: 700 22px Georgia, 'Times New Roman', serif; fill: #17181A; }
    .li { font: 400 15px Helvetica, Arial, sans-serif; fill: #82868C; }
    .verdict { font: 600 15px Helvetica, Arial, sans-serif; }
  </style>
  <rect width="720" height="480" fill="#FCFCFD"/>
  <text x="10" y="38" class="num">01</text>
  <text x="56" y="40" class="title">Managing Yourself</text>
  <text x="56" y="68" class="desc">Put your own oxygen mask on first; craft your mission statement</text>
  <line x1="0" y1="96" x2="720" y2="96" stroke="#E3E5E8" stroke-width="1"/>
  <text x="10" y="134" class="num">02</text>
  <text x="56" y="136" class="title">Define Your Foundation</text>
  <text x="56" y="164" class="desc">Family core values, rules of engagement, and shared life goals</text>
  <line x1="0" y1="192" x2="720" y2="192" stroke="#E3E5E8" stroke-width="1"/>
  <text x="10" y="230" class="num">03</text>
  <text x="56" y="232" class="title">Roles &amp; Responsibilities</text>
  <text x="56" y="260" class="desc">Assign household tasks so no unspoken expectations cause pain</text>
  <line x1="0" y1="288" x2="720" y2="288" stroke="#E3E5E8" stroke-width="1"/>
  <text x="10" y="326" class="num">04</text>
  <text x="56" y="328" class="title">Planning &amp; Goal Setting</text>
  <text x="56" y="356" class="desc">Set family goals for health, wealth, growth, fun, relationship</text>
  <line x1="0" y1="384" x2="720" y2="384" stroke="#E3E5E8" stroke-width="1"/>
  <rect x="0" y="385" width="720" height="95" fill="#F2F3F5"/>
  <text x="10" y="422" class="num">05</text>
  <text x="56" y="424" class="title">Problem-Solving &amp; Finance</text>
  <text x="56" y="452" class="desc">Fix issues calmly like at work; budget and track net worth</text>
</svg>
