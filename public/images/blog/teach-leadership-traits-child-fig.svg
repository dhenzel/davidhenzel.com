<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 288" role="img" aria-label="Numbered list of three ways to teach children leadership: team building through extracurricular activities, encouraging playfulness and curiosity, and telling stories of grit.">
  <style>
    .num { font: 600 13px Helvetica, Arial, sans-serif; fill: #2563EB; letter-spacing: .08em; }
    .title { font: 700 21px Georgia, 'Times New Roman', serif; fill: #17181A; }
    .desc { font: 400 15px Helvetica, Arial, sans-serif; fill: #82868C; }
    .accent { fill: #2563EB; }
    .label { font: 600 12px Helvetica, Arial, sans-serif; letter-spacing: .12em; }
    .h { font: 700 22px Georgia, 'Times New Roman', serif; fill: #17181A; }
    .li { font: 400 15px Helvetica, Arial, sans-serif; fill: #82868C; }
    .verdict { font: 600 15px Helvetica, Arial, sans-serif; }
  </style>
  <rect width="720" height="288" fill="#FCFCFD"/>
  <text x="10" y="38" class="num">01</text>
  <text x="56" y="40" class="title">Encourage Team Building</text>
  <text x="56" y="68" class="desc">Camps, bands, volunteering — real tastes of adult teamwork</text>
  <line x1="0" y1="96" x2="720" y2="96" stroke="#E3E5E8" stroke-width="1"/>
  <text x="10" y="134" class="num">02</text>
  <text x="56" y="136" class="title">Fuel Play &amp; Curiosity</text>
  <text x="56" y="164" class="desc">Word games, role play, and nuanced feedback on their ideas</text>
  <line x1="0" y1="192" x2="720" y2="192" stroke="#E3E5E8" stroke-width="1"/>
  <rect x="0" y="193" width="720" height="95" fill="#F2F3F5"/>
  <text x="10" y="230" class="num">03</text>
  <text x="56" y="232" class="title">Tell Stories of Grit</text>
  <text x="56" y="260" class="desc">Kids don't do what you tell them; they copy what you do</text>
</svg>
