<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="The front door versus the back door: acquisition chases strangers while lapsed customers sit ignored">
  <style>
    .label { font: 600 12px Helvetica, Arial, sans-serif; letter-spacing: .12em; }
    .h { font: 700 22px Georgia, 'Times New Roman', serif; fill: #17181A; }
    .li { font: 400 15px Helvetica, Arial, sans-serif; fill: #82868C; }
    .verdict { font: 600 15px Helvetica, Arial, sans-serif; }
  </style>
  <rect width="720" height="320" fill="#FCFCFD"/>
  <line x1="360" y1="0" x2="360" y2="320" stroke="#17181A" stroke-width="1"/>

  <!-- Front door -->
  <text x="28" y="42" class="label" fill="#82868C">THE FRONT DOOR</text>
  <text x="28" y="82" class="h">Acquisition</text>
  <text x="28" y="122" class="li">Ads, funnels, SEO, content</text>
  <text x="28" y="152" class="li">Strangers who never heard of you</text>
  <text x="28" y="182" class="li">All the budget, all the attention</text>
  <line x1="28" y1="224" x2="332" y2="224" stroke="#E3E5E8" stroke-width="1"/>
  <text x="28" y="258" class="verdict" fill="#82868C">Colder and pricier every quarter</text>

  <!-- Back door -->
  <text x="388" y="42" class="label" fill="#2563EB">THE BACK DOOR</text>
  <text x="388" y="82" class="h">Your lapsed customers</text>
  <text x="388" y="122" class="li">Already know you, already paid you</text>
  <text x="388" y="152" class="li">Drifted by default, not by decision</text>
  <text x="388" y="182" class="li">Almost nobody works the list</text>
  <line x1="388" y1="224" x2="692" y2="224" stroke="#E3E5E8" stroke-width="1"/>
  <text x="388" y="258" class="verdict" fill="#2563EB">The warmest revenue you own</text>
</svg>
